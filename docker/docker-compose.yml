---
# xml-drift-lakehouse — Airflow + Superset stack
# Usage:
#   cd docker
#   docker compose up airflow-init      # first time only
#   docker compose up superset-init     # first time only
#   docker compose up -d                # start all services
#   open http://localhost:8080          # Airflow  — admin / admin
#   open http://localhost:8088          # Superset — admin / admin
#   docker compose down                 # stop all services
#   docker compose down -v              # stop + remove volumes (full reset)

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    DBT_PARQUET_PATH: /opt/project/output
    DBT_PROJECT_DIR: /opt/project/dbt
  volumes:
    # Mount entire project into container
    - ..:/opt/project
    # Airflow-specific folders
    - ../airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - lakehouse

services:

  # ── Metadata database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - lakehouse

  # ── Airflow init (runs once) ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs/scheduler
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: "no"
    networks:
      - lakehouse

  # ── Scheduler ─────────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - lakehouse

  # ── Webserver ──────────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - lakehouse

  # ── Superset init (runs once) ──────────────────────────────────────────────
  superset-init:
    image: apache/superset:latest
    environment:
      SUPERSET_SECRET_KEY: "superset-lakehouse-secret-change-in-prod"
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - superset-home:/app/superset_home
      - ..:/opt/project                        # access to lakehouse.duckdb
    entrypoint: /bin/bash
    command:
      - -c
      - |
        /app/.venv/bin/pip install duckdb-engine sqlalchemy --quiet
        superset db upgrade
        superset fab create-admin \
          --username admin \
          --firstname Admin \
          --lastname User \
          --email admin@example.com \
          --password admin
        superset init
    restart: "no"
    networks:
      - lakehouse

  # ── Superset webserver ─────────────────────────────────────────────────────
  superset:
    build:
      context: ..
      dockerfile: docker/Dockerfile.superset
    environment:
      SUPERSET_SECRET_KEY: "superset-lakehouse-secret-change-in-prod"
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - superset-home:/app/superset_home
      - ..:/opt/project                        # access to lakehouse.duckdb
    ports:
      - "8088:8088"
    command: superset run -h 0.0.0.0 -p 8088 --with-threads --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - lakehouse

volumes:
  postgres-db:
  airflow-plugins:
  airflow-logs:
  superset-home:

networks:
  lakehouse:
    driver: bridge
