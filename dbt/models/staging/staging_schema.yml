version: 2

models:
  - name: stg_detailed_invoice
    description: "Staged DetailedInvoice records — full unit economics, service items, allocations"
    columns:
      - name: line_sk
        description: "Surrogate key for line item"
        tests:
          - not_null
          - unique

      - name: invoice_sk
        description: "FK to invoice header"
        tests:
          - not_null

      - name: invoice_id
        description: "Natural invoice identifier"
        tests:
          - not_null

      - name: variant
        description: "Must be DetailedInvoice"
        tests:
          - not_null
          - accepted_values:
              values: ["DetailedInvoice"]

      - name: document_date
        description: "Invoice date"
        tests:
          - not_null

      - name: invoice_total
        description: "Total invoice amount"
        tests:
          - not_null

      - name: action_status
        description: "Approval status"
        tests:
          - accepted_values:
              values: ["Approved", "Pending", "Rejected", "Disputed", "Cancelled", "On Hold", "Submitted", "Re-Submitted"]
              config:
                severity: warn

      - name: vendor_entity_name
        description: "Vendor name"
        tests:
          - not_null

      - name: client_entity_name
        description: "Client name"
        tests:
          - not_null

      - name: line_number
        description: "Line number within invoice"
        tests:
          - not_null

      - name: quantity
        description: "Line quantity — required for DetailedInvoice"
        tests:
          - not_null

      - name: unit_price
        description: "Unit price — required for DetailedInvoice"
        tests:
          - not_null

  - name: stg_summary_invoice
    description: "Staged SummaryInvoice records — lean lines, header-level allocation"
    columns:
      - name: line_sk
        description: "Surrogate key for line item"
        tests:
          - not_null
          - unique

      - name: invoice_sk
        description: "FK to invoice header"
        tests:
          - not_null

      - name: invoice_id
        description: "Natural invoice identifier"
        tests:
          - not_null

      - name: variant
        description: "Must be SummaryInvoice"
        tests:
          - not_null
          - accepted_values:
              values: ["SummaryInvoice"]

      - name: document_date
        description: "Invoice date"
        tests:
          - not_null

      - name: invoice_total
        description: "Total invoice amount"
        tests:
          - not_null

      - name: action_status
        description: "Approval status"
        tests:
          - accepted_values:
              values: ["Approved", "Pending", "Rejected", "Disputed", "Cancelled", "On Hold", "Submitted", "Re-Submitted"]
              config:
                severity: warn

      - name: vendor_entity_name
        description: "Vendor name"
        tests:
          - not_null

      - name: client_entity_name
        description: "Client name"
        tests:
          - not_null

      - name: line_number
        description: "Line number within invoice"
        tests:
          - not_null
